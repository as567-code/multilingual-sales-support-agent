# docker-compose for local dev + smoke-test deployment of the agent.
#
# Usage:
#   cp .env.example .env  # fill in MISTRAL_API_KEY
#   docker compose up --build
#   curl http://localhost:8000/health
#   curl -X POST http://localhost:8000/ask \
#        -H 'content-type: application/json' \
#        -d '{"query":"How do I cancel my TechNova subscription?"}'
#
# The `data/processed` directory is bind-mounted read-only so the image
# does not have to be rebuilt when the index is regenerated by the ingest
# pipeline. If you'd rather ship a self-contained image, drop the volume
# and rely on the COPY in the Dockerfile.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: multilingual-sales-support-agent:latest
    container_name: msa-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
    volumes:
      - ./data/processed:/app/data/processed:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    # Presidio + sentence-transformers need the default 64MB /dev/shm on some
    # runtimes; bump to 512MB to avoid SIGBUS on model load.
    shm_size: "512m"
